server {
    listen 80;
    server_name daeilfoundation.or.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name daeilfoundation.or.kr;

    ssl_certificate     /etc/letsencrypt/live/daeilfoundation.or.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daeilfoundation.or.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # robots.txt — served from SPA public directory
    location = /robots.txt {
        root /var/www/app;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # sitemap.xml — proxied to Go backend
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=3600";
    }

    # OG endpoints — proxied to Go backend (bot-facing HTML for social sharing)
    location /og/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Post detail — bots are rewritten to /og/post/N (then proxied above), users get SPA
    location ~ ^/post/(\d+)$ {
        if ($is_bot) {
            rewrite ^/post/(.*)$ /og/post/$1 last;
        }
        root /var/www/app;
        try_files $uri $uri/ /index.html;
        gzip on;
        gzip_types text/css application/javascript application/json;
    }

    # Default — Frontend SPA
    location / {
        root /var/www/app;
        try_files $uri $uri/ /index.html;
        gzip on;
        gzip_types text/css application/javascript application/json;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /var/www/admin/;
        try_files $uri $uri/ /admin/index.html;
        gzip on;
        gzip_types text/css application/javascript application/json;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pg/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /legacy/ {
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
    }

    location /files/ {
        alias /var/www/legacy/files/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
