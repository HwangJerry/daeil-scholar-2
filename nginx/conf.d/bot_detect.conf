# bot_detect.conf — User-Agent based bot detection map (include in http context)
#
# IMPORTANT: This file uses the 'map' directive which MUST be included at the
# http context level (not inside a server block). In production, ensure the
# parent nginx.conf includes this file alongside rate_limit.conf, e.g.:
#   include /etc/nginx/conf.d/bot_detect.conf;
#
# The $is_bot variable is used by alumni.conf to route bots to OG endpoints.

map $http_user_agent $is_bot {
    default                   0;
    ~*Googlebot               1;
    ~*Bingbot                 1;
    ~*facebookexternalhit     1;
    ~*Twitterbot              1;
    ~*kakaotalk               1;
    ~*LinkedInBot             1;
    ~*WhatsApp                1;
    ~*Discordbot              1;
    ~*Slack                   1;
    ~*crawl                   1;
    ~*spider                  1;
}
