worker_processes 1;
daemon off;

pid        tmp/nginx.pid;
error_log  tmp/nginx-error.log;

events {
    worker_connections 64;
}

http {
    access_log tmp/nginx-access.log;

    # Inline MIME types (avoids dependency on Homebrew mime.types path)
    types {
        text/html                 html htm;
        text/css                  css;
        text/javascript           js mjs;
        application/json          json;
        application/wasm          wasm;
        image/png                 png;
        image/jpeg                jpg jpeg;
        image/gif                 gif;
        image/svg+xml             svg svgz;
        image/webp                webp;
        image/x-icon              ico;
        font/woff                 woff;
        font/woff2                woff2;
        application/octet-stream  bin;
    }
    default_type application/octet-stream;

    sendfile on;

    # Bot detection map (for SEO routing)
    include conf.d/bot_detect.conf;

    # WebSocket upgrade map (for Vite HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8000;
        server_name localhost client-macbook.tail04b57d.ts.net;

        # --- Go backend: /api, /files, /uploads ---
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /files/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
        }

        location /uploads/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
        }

        # --- PG callbacks: EasyPay relay + return ---
        location /pg/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Admin SPA: Vite dev server on :3001 ---
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host              $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # --- SEO: sitemap + OG endpoints proxied to Go backend ---
        location = /sitemap.xml {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /og/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Frontend SPA: Vite dev server on :5173 (default) ---
        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_set_header Host              $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }
}
