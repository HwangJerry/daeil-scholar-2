# httpd-alumni.conf — daeilfoundation.or.kr Apache VirtualHost (Go+React 신규 스택)
# 배포: scp deploy/httpd-alumni.conf user@server:/etc/httpd/conf.d/alumni.conf

# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName  daeilfoundation.or.kr
    ServerAlias www.daeilfoundation.or.kr
    Redirect permanent / https://daeilfoundation.or.kr/
</VirtualHost>

<VirtualHost *:443>
    ServerName daeilfoundation.or.kr

    SSLEngine on
    SSLCertificateFile     /etc/letsencrypt/live/daeilfoundation.or.kr/fullchain.pem
    SSLCertificateKeyFile  /etc/letsencrypt/live/daeilfoundation.or.kr/privkey.pem
    SSLProtocol            all -SSLv3 -TLSv1 -TLSv1.1

    # === Go 백엔드 프록시 ===
    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass /api/      http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/

    ProxyPass /pg/       http://127.0.0.1:8080/pg/
    ProxyPassReverse /pg/ http://127.0.0.1:8080/pg/

    ProxyPass /og/       http://127.0.0.1:8080/og/
    ProxyPassReverse /og/ http://127.0.0.1:8080/og/

    ProxyPass /sitemap.xml http://127.0.0.1:8080/sitemap.xml
    ProxyPassReverse /sitemap.xml http://127.0.0.1:8080/sitemap.xml

    ProxyPass /rss.xml http://127.0.0.1:8080/rss.xml
    ProxyPassReverse /rss.xml http://127.0.0.1:8080/rss.xml

    # === 정적 파일 ===
    Alias /files/   /var/www/legacy/files/
    Alias /uploads/ /var/www/uploads/

    <Directory /var/www/legacy/files>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/uploads>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # === 레거시 PHP (.htaccess ForceType 그대로 작동) ===
    Alias /old/ /var/www/html/
    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        php_value auto_prepend_file /var/www/html/_set_docroot.php
    </Directory>

    # === Admin SPA ===
    Alias /admin/ /var/www/admin/
    <Directory /var/www/admin>
        Options -Indexes
        AllowOverride None
        Require all granted
        RewriteEngine On
        RewriteBase /admin/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    # === Frontend SPA ===
    DocumentRoot /var/www/app
    <Directory /var/www/app>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # SEO: 봇 → /post/N 을 Go OG 핸들러로 프록시
    RewriteEngine On
    RewriteCond %{HTTP_USER_AGENT} (Googlebot|Bingbot|facebookexternalhit|Twitterbot|kakaotalk|LinkedInBot|WhatsApp|Discordbot|Slack|crawl|spider) [NC]
    RewriteRule ^/post/(\d+)$ http://127.0.0.1:8080/og/post/$1 [P,L]

    # SPA 폴백: 파일이 없으면 index.html (ProxyPass/Alias 경로 제외)
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/pg/
    RewriteCond %{REQUEST_URI} !^/og/
    RewriteCond %{REQUEST_URI} !^/sitemap\.xml
    RewriteCond %{REQUEST_URI} !^/rss\.xml
    RewriteCond %{REQUEST_URI} !^/old/
    RewriteCond %{REQUEST_URI} !^/admin/
    RewriteCond %{REQUEST_URI} !^/files/
    RewriteCond %{REQUEST_URI} !^/uploads/
    RewriteCond %{REQUEST_URI} !^/assets/
    RewriteCond %{REQUEST_URI} !\.(png|jpg|jpeg|gif|ico|svg|css|js|woff2?|ttf|eot|txt|xml|pdf|map)$
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule ^ /index.html [L]

    ErrorLog  /var/logs/alumni/httpd-error.log
    CustomLog /var/logs/alumni/httpd-access.log combined
</VirtualHost>
