# k8s/backend/secret.template.yaml
# 참조용 템플릿 — 실제 값 없음, Git 커밋 가능
# 클러스터에서 아래 명령어를 1회 실행 (token은 직접 입력)
#
# kubectl create secret generic backend-env -n daeil \
#   --from-literal=DB_HOST=<mariadb-service-name> \
#   --from-literal=DB_PORT=3306 \
#   --from-literal=DB_USER=alumni \
#   --from-literal=DB_PASSWORD=<password> \
#   --from-literal=DB_NAME=alumni \
#   --from-literal=JWT_SECRET=<secret> \
#   --from-literal=SITE_BASE_URL=https://daeil-app.tail04b57d.ts.net \
#   --from-literal=ALLOWED_ORIGIN=https://daeil-app.tail04b57d.ts.net \
#   --from-literal=KAKAO_CLIENT_ID=<id> \
#   --from-literal=KAKAO_CLIENT_SECRET=<secret> \
#   --from-literal=KAKAO_REDIRECT_URI=https://daeil-app.tail04b57d.ts.net/api/auth/kakao/callback \
#   --from-literal=UPLOAD_BASE_PATH=/var/www/uploads \
#   --from-literal=SMTP_HOST=<smtp-host> \
#   --from-literal=SMTP_PORT=587 \
#   --from-literal=SMTP_USER=<smtp-user> \
#   --from-literal=SMTP_PASSWORD=<smtp-password> \
#   --from-literal=SMTP_FROM=noreply@dflh.kr
#
# 주의:
# - EasyPay/PG 관련 env는 테스트 환경에서 필요 없으면 생략 가능
# - MariaDB Pod의 Service 이름을 DB_HOST에 입력
# - 이 파일 자체는 Git에 커밋해도 안전 (실제 값 없음)
