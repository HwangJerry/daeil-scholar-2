apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: daeil
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/hwangjerry/daeil-backend:latest  # CI에서 SHA로 교체
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: backend-env
          volumeMounts:
            - name: uploads
              mountPath: /var/www/uploads
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
