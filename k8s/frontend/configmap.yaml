apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: daeil
data:
  default.conf: |
    server {
      listen 80;

      # Frontend SPA (base: /)
      location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
      }

      # Admin SPA (base: /admin/ — vite.config.ts에 설정)
      # trailing slash 없이 접근 시 301 redirect
      location = /admin {
        return 301 /admin/;
      }
      location /admin/ {
        alias /usr/share/nginx/admin/;
        try_files $uri $uri/ /admin/index.html;
      }

      # Go backend API
      location /api/ {
        proxy_pass http://backend-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      # 파일 업로드 서빙
      location /uploads/ {
        proxy_pass http://backend-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      # 레거시 파일 서빙
      location /files/ {
        proxy_pass http://backend-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      # OG 이미지
      location /og/ {
        proxy_pass http://backend-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      # Sitemap
      location /sitemap.xml {
        proxy_pass http://backend-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }

      # PG 결제 콜백
      location /pg/ {
        proxy_pass http://backend-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      }
    }
