# k8s/tailscale/secret.template.yaml
# Tailscale Operator OAuth Secret — 참조용 템플릿, Git 커밋 가능
#
# 사전 준비 (Tailscale Admin Console에서 1회):
#   1. Admin → DNS → Funnel 켜기
#   2. Admin → Access Controls → tagOwners에 "tag:k8s-operator": [] 추가
#   3. Admin → Settings → OAuth Clients 생성 (Scope: Devices Write)
#      → client_id, client_secret 기록 (한 번만 표시됨)
#
# Helm으로 Tailscale Operator 설치:
#
#   helm repo add tailscale https://pkgs.tailscale.com/helmcharts && helm repo update
#
#   helm upgrade --install tailscale-operator tailscale/tailscale-operator \
#     --namespace tailscale --create-namespace \
#     --set oauth.clientId=<client-id> \
#     --set oauth.clientSecret=<client-secret> \
#     --set operatorConfig.defaultTags="{tag:k8s-operator}" \
#     --wait
#
# 설치 확인:
#   kubectl get pods -n tailscale
#   kubectl get ingressclass tailscale
#
# 이 파일 자체는 Git에 커밋해도 안전 (실제 값 없음)
