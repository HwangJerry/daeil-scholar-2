apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-tailscale
  namespace: daeil
  annotations:
    tailscale.com/funnel: "true"
    tailscale.com/hostname: "daeil-app"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: frontend-service
      port:
        number: 80
